<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>News Stories</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        .container { width: 100vw; height: 100vh; position: relative; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; padding: 40px; box-sizing: border-box; text-align: center; }
        .slide.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .source-badge { color: #1d9bf0; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        h1 { font-size: 2rem; }
        #status { position: absolute; top: 50%; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div id="status">Lade Nachrichten...</div>
        <div id="slidesArea"></div>
    </div>

    <script>
        const FEEDS = [
            { url: 'https://www.nzz.ch/recent.rss', name: 'NZZ' },
            { url: 'https://www.economist.com/sections/main/rss.xml', name: 'Economist' }
        ];

        async function fetchRSS(feed) {
            try {
                // RSS2JSON API acts as a reliable proxy
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.status !== 'ok') throw new Error("API Fehler");
                
                return data.items.map(item => ({
                    title: item.title,
                    source: feed.name
                }));
            } catch (e) {
                console.error(`Error with ${feed.name}:`, e);
                return [];
            }
        }

        async function init() {
            const results = await Promise.all(FEEDS.map(fetchRSS));
            let stories = [];
            
            // Combine them
            const maxLength = Math.max(results[0].length, results[1].length);
            for(let i = 0; i < maxLength; i++) {
                if(results[0][i]) stories.push(results[0][i]);
                if(results[1][i]) stories.push(results[1][i]);
            }

            if(stories.length === 0) {
                document.getElementById('status').innerText = "Keine Daten geladen. Überprüfe API-Limit.";
                return;
            }

            document.getElementById('status').style.display = 'none';
            const area = document.getElementById('slidesArea');
            
            stories.forEach((s, i) => {
                area.innerHTML += `
                    <div class="slide ${i === 0 ? 'active' : ''}">
                        <div class="source-badge">${s.source}</div>
                        <h1>${s.title}</h1>
                    </div>`;
            });

            // Basic slideshow logic
            let current = 0;
            setInterval(() => {
                document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
                current = (current + 1) % stories.length;
                document.querySelectorAll('.slide')[current].classList.add('active');
            }, 5000);
        }

        init();
    </script>
</body>
</html>
