<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Stories - Kristallklar</title>
    <style>
        :root { --bg-color: #030914; --text-color: #ffffff; --text-muted: #a0aab8; --accent-blue: #1d9bf0; --story-duration: 7000ms; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #000; color: var(--text-color); display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; overflow: hidden; }
        .story-wrapper { position: relative; width: 100vw; height: 100vh; max-width: calc(100vh * 9 / 16); max-height: calc(100vw * 16 / 9); aspect-ratio: 9 / 16; background-color: var(--bg-color); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.85); }
        .progress-container { position: absolute; top: 2vh; left: 0; right: 0; display: flex; padding: 0 4%; gap: 6px; z-index: 10; }
        .progress-bar { height: 3px; flex: 1; background-color: rgba(255, 255, 255, 0.25); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background-color: #fff; }
        .story-header { position: absolute; top: 4vh; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; z-index: 10; }
        .slides-container { width: 100%; height: 100%; position: relative; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 0.4s ease-in-out; display: flex; flex-direction: column; }
        .slide.active { opacity: 1; visibility: visible; }
        .image-container { width: 100%; height: 58%; position: relative; background-color: #111; }
        .story-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .content-container { flex: 1; padding: 6% 6% 0 6%; background-color: var(--bg-color); }
        .ticker-badge { font-size: 0.85rem; text-transform: uppercase; font-weight: 800; color: var(--accent-blue); margin-bottom: 3%; }
        .story-title { font-family: Georgia, serif; font-size: 1.8rem; line-height: 1.3; color: white; margin-bottom: 2%; }
        .story-description { font-size: 1.1rem; line-height: 1.5; color: var(--text-muted); }
        .nav-zones { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: flex; }
    </style>
</head>
<body>

    <div class="story-wrapper">
        <div id="loader" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white;">Lade Nachrichten...</div>
        <div class="progress-container" id="progressContainer"></div>
        <div class="story-header" id="storyHeader" style="display: none;">
            <div id="headerCategory" style="font-weight: bold;">News</div>
        </div>
        <div class="nav-zones">
            <div class="zone-left" id="zoneLeft" style="width: 33%;"></div>
            <div class="zone-right" id="zoneRight" style="width: 67%;"></div>
        </div>
        <div class="slides-container" id="slidesContainer"></div>
    </div>

    <script>
        const FEEDS = [
            { url: 'https://www.nzz.ch/recent.rss', name: 'NZZ' },
            { url: 'https://www.economist.com/sections/main/rss.xml', name: 'Economist' }
        ];
        
        let stories = [];
        let currentIndex = 0;

        async function fetchFeed(url, name) {
            try {
                // Using AllOrigins as it is generally reliable for XML
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                return Array.from(items).slice(0, 8).map(item => {
                    // Robust image extraction
                    const mediaContent = item.getElementsByTagName('media:content')[0]?.getAttribute('url');
                    const enclosure = item.querySelector('enclosure')?.getAttribute('url');
                    const description = item.querySelector('description')?.textContent || '';
                    const imgMatch = description.match(/src=["'](.*?)["']/);
                    
                    let imageUrl = mediaContent || enclosure || (imgMatch ? imgMatch[1] : null);

                    // If NZZ, add optimization params
                    if (name === 'NZZ' && imageUrl && imageUrl.includes('nzz.ch')) {
                        imageUrl = imageUrl.split('?')[0] + '?width=1200';
                    }

                    return {
                        title: item.querySelector('title')?.textContent || 'Kein Titel',
                        description: item.querySelector('description')?.textContent.replace(/<[^>]*>/g, '').substring(0, 150) + '...',
                        imageUrl: imageUrl || 'https://images.unsplash.com/photo-1585829365295-ab7cd400c167',
                        category: name
                    };
                });
            } catch (e) {
                console.error(`Error fetching ${name}:`, e);
                return [];
            }
        }

        async function init() {
            const results = await Promise.all(FEEDS.map(f => fetchFeed(f.url, f.name)));
            
            // Interleave
            const maxLength = Math.max(...results.map(r => r.length));
            stories = [];
            for(let i=0; i<maxLength; i++) {
                results.forEach(arr => { if(arr[i]) stories.push(arr[i]); });
            }

            if(stories.length === 0) {
                document.getElementById('loader').innerText = "Keine Feeds gefunden. Konsole prüfen.";
                return;
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('storyHeader').style.display = 'flex';
            
            const container = document.getElementById('slidesContainer');
            const progress = document.getElementById('progressContainer');

            stories.forEach((s, i) => {
                const bar = document.createElement('div');
                bar.className = 'progress-bar';
                bar.innerHTML = `<div class="progress-fill" id="fill-${i}"></div>`;
                progress.appendChild(bar);

                const slide = document.createElement('div');
                slide.className = `slide ${i === 0 ? 'active' : ''}`;
                slide.innerHTML = `
                    <div class="image-container">
                        <img class="story-img" src="${s.imageUrl}" onerror="this.src='https://images.unsplash.com/photo-1585829365295-ab7cd400c167'">
                    </div>
                    <div class="content-container">
                        <div class="ticker-badge">${s.category}</div>
                        <h1 class="story-title">${s.title}</h1>
                        <p class="story-description">${s.description}</p>
                    </div>
                `;
                container.appendChild(slide);
            });
            showSlide(0);
        }

        function showSlide(idx) {
            currentIndex = idx;
            document.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('active', i === idx));
            document.getElementById('headerCategory').innerText = stories[idx].category;
            
            // Animate progress
            document.querySelectorAll('.progress-fill').forEach((f, i) => f.style.width = i < idx ? '100%' : (i === idx ? '0%' : '0%'));
            
            // Start Progress
            let start = null;
            const fill = document.getElementById(`fill-${idx}`);
            function step(timestamp) {
                if(!start) start = timestamp;
                const elapsed = timestamp - start;
                fill.style.width = Math.min((elapsed / 7000) * 100, 100) + '%';
                if(elapsed < 7000) requestAnimationFrame(step);
                else {
                    const next = (currentIndex + 1) % stories.length;
                    showSlide(next);
                }
            }
            requestAnimationFrame(step);
        }

        document.getElementById('zoneLeft').addEventListener('click', () => { 
            let prev = (currentIndex - 1 + stories.length) % stories.length;
            showSlide(prev); 
        });
        document.getElementById('zoneRight').addEventListener('click', () => { 
            let next = (currentIndex + 1) % stories.length;
            showSlide(next); 
        });

        init();
    </script>
</body>
</html>
