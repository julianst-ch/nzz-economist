<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Stories - Kristallklar</title>
    <style>
        :root {
            --bg-color: #030914;
            --text-color: #ffffff;
            --text-muted: #a0aab8;
            --accent-blue: #1d9bf0;
            --story-duration: 7000ms;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: var(--text-color); display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; overflow: hidden; }
        .story-wrapper { position: relative; width: 100vw; height: 100vh; max-width: calc(100vh * 9 / 16); max-height: calc(100vw * 16 / 9); aspect-ratio: 9 / 16; background-color: var(--bg-color); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.85); }
        .progress-container { position: absolute; top: 2vh; left: 0; right: 0; display: flex; padding: 0 4%; gap: 6px; z-index: 10; }
        .progress-bar { height: 3px; flex: 1; background-color: rgba(255, 255, 255, 0.25); border-radius: 2px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; width: 0%; background-color: #fff; }
        .story-header { position: absolute; top: 4vh; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; z-index: 10; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
        .meta-info { display: flex; align-items: center; font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }
        .category { color: #fff; }
        .time-ago { color: var(--text-muted); margin-left: 8px; }
        .close-btn { background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; opacity: 0.7; line-height: 1; }
        .nav-zones { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: flex; }
        .zone-left { width: 33%; height: 100%; }
        .zone-right { width: 67%; height: 100%; }
        .slides-container { width: 100%; height: 100%; position: relative; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 0.4s ease-in-out; display: flex; flex-direction: column; }
        .slide.active { opacity: 1; visibility: visible; }
        .image-container { width: 100%; height: 58%; position: relative; background-color: #000; }
        .story-img { width: 100%; height: 100%; object-fit: cover; }
        .image-container::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 120px; background: linear-gradient(to bottom, transparent, var(--bg-color)); }
        .content-container { flex: 1; padding: 4% 6% 0 6%; display: flex; flex-direction: column; justify-content: flex-start; background-color: var(--bg-color); margin-bottom: 10vh; }
        .ticker-badge { align-self: flex-start; font-size: 0.85rem; text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; color: var(--accent-blue); margin-bottom: 3%; }
        .story-title { font-family: Georgia, serif; font-size: 2.1rem; line-height: 1.35; font-weight: 600; margin-bottom: 4%; color: var(--text-color); }
        .story-description { font-size: 1.25rem; line-height: 1.65; color: var(--text-muted); }
        .story-author { font-size: 0.95rem; color: var(--text-muted); margin-top: auto; padding-top: 15px; }
        .loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.2rem; color: var(--text-muted); z-index: 20; text-align: center; }
    </style>
</head>
<body>

    <div id="error-debug" style="position: absolute; top: 0; left: 0; right: 0; background: rgba(220, 20, 60, 0.95); color: white; padding: 15px; z-index: 99999; font-family: monospace; font-size: 13px; display: none; word-break: break-all; text-align: left;"></div>

    <div class="story-wrapper">
        <div class="loader" id="loader">Lade Nachrichten...</div>
        <div class="progress-container" id="progressContainer"></div>
        <div class="story-header" id="storyHeader" style="display: none;">
            <div class="meta-info">
                <span class="category" id="headerCategory">News</span>
                <span class="time-ago" id="headerTime">Jetzt</span>
            </div>
            <button class="close-btn">&times;</button>
        </div>
        <div class="nav-zones">
            <div class="zone-left" id="zoneLeft"></div>
            <div class="zone-right" id="zoneRight"></div>
        </div>
        <div class="slides-container" id="slidesContainer"></div>
    </div>

    <script>
        const NZZ_RSS = 'https://www.nzz.ch/recent.rss';
        const ECON_RSS = 'https://www.economist.com/sections/main/rss.xml';
        const STORY_DURATION = 7000;

        let stories = [];
        let currentIndex = 0;
        let startTime = null;
        let animationFrameId = null;

        async function fetchRSS(url, sourceName) {
            try {
                // Try first proxy
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
                if (response.ok) return parseXml(await response.text(), sourceName);
            } catch (e) { console.warn(`Proxy 1 failed for ${sourceName}`); }

            try {
                // Try backup proxy
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                return parseXml(data.contents, sourceName);
            } catch (e) {
                console.error(`All proxies failed for ${sourceName}`);
                return [];
            }
        }

        function parseXml(xmlString, sourceName) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            const items = xmlDoc.querySelectorAll("item");
            
            return Array.from(items).slice(0, 10).map(item => {
                const title = item.querySelector('title')?.textContent || '';
                const rawDescription = item.querySelector('description')?.textContent || '';
                const pubDate = item.querySelector('pubDate')?.textContent || '';
                
                let imageUrl = '';
                // Search for images in enclosure, content, or media tags
                const enclosure = item.querySelector('enclosure')?.getAttribute('url') || item.querySelector('media\\:content')?.getAttribute('url');
                if (enclosure) imageUrl = enclosure;
                
                // Fallback for description images
                if (!imageUrl) {
                    const imgMatch = rawDescription.match(/<img[^>]+src="([^">]+)"/i);
                    if (imgMatch) imageUrl = imgMatch[1];
                }
                
                // NZZ Specific Image Optimization
                if (imageUrl && imageUrl.includes('nzz.ch')) {
                    imageUrl = `${imageUrl.split('?')[0]}?width=1440&fit=bounds&quality=85&auto=webp`;
                }

                if (!imageUrl) imageUrl = 'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=1200';

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = rawDescription;
                const cleanDescription = tempDiv.textContent || tempDiv.innerText || '';

                return { title, description: cleanDescription.trim(), imageUrl, pubDate, category: sourceName };
            });
        }

        async function init() {
            const [nzzStories, econStories] = await Promise.all([
                fetchRSS(NZZ_RSS, 'NZZ'),
                fetchRSS(ECON_RSS, 'The Economist')
            ]);

            // Interleave logic
            stories = [];
            const maxLength = Math.max(nzzStories.length, econStories.length);
            for (let i = 0; i < maxLength; i++) {
                if (nzzStories[i]) stories.push(nzzStories[i]);
                if (econStories[i]) stories.push(econStories[i]);
            }

            if (stories.length === 0) {
                document.getElementById('loader').innerText = "Keine Nachrichten gefunden.";
                return;
            }

            renderSlides();
        }

        function renderSlides() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('storyHeader').style.display = 'flex';
            const progressContainer = document.getElementById('progressContainer');
            const slidesContainer = document.getElementById('slidesContainer');

            stories.forEach((story, idx) => {
                const bar = document.createElement('div');
                bar.className = 'progress-bar';
                bar.innerHTML = `<div class="progress-fill" id="fill-${idx}"></div>`;
                progressContainer.appendChild(bar);

                const slide = document.createElement('div');
                slide.className = `slide ${idx === 0 ? 'active' : ''}`;
                slide.innerHTML = `
                    <div class="image-container">
                        <img class="story-img" src="${story.imageUrl}" alt="News Image">
                    </div>
                    <div class="content-container">
                        <div class="ticker-badge">${story.category}</div>
                        <h1 class="story-title">${story.title}</h1>
                        <p class="story-description">${story.description}</p>
                    </div>
                `;
                slidesContainer.appendChild(slide);
            });
            showStory(0);
        }

        function showStory(index) {
            cancelAnimationFrame(animationFrameId);
            currentIndex = index;
            document.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('active', i === index));
            document.getElementById('headerCategory').innerText = stories[index].category;
            
            // Update progress bar
            document.querySelectorAll('.progress-fill').forEach((f, i) => f.style.width = i < index ? '100%' : '0%');
            
            startTime = performance.now();
            animateProgress();
        }

        function animateProgress() {
            const elapsed = performance.now() - startTime;
            const progress = Math.min((elapsed / STORY_DURATION) * 100, 100);
            document.getElementById(`fill-${currentIndex}`).style.width = `${progress}%`;
            if (progress < 100) animationFrameId = requestAnimationFrame(animateProgress);
            else if (currentIndex < stories.length - 1) showStory(currentIndex + 1);
            else showStory(0);
        }

        document.getElementById('zoneLeft').addEventListener('click', () => showStory(Math.max(0, currentIndex - 1)));
        document.getElementById('zoneRight').addEventListener('click', () => showStory(Math.min(stories.length - 1, currentIndex + 1)));

        init();
    </script>
</body>
</html>
