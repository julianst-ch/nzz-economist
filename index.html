<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZZ News Stories - Universal Playout</title>
    <style>
        :root {
            --bg-color: #050b14; 
            --text-color: #ffffff;
            --text-muted: #a2aebf;
            --accent-blue: #2e96ff;
            --story-duration: 7000ms;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Perfekte 9:16 Box */
        .story-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: calc(100vh * 9 / 16);
            max-height: calc(100vw * 16 / 9);
            aspect-ratio: 9 / 16;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.85);
        }

        /* Progress Bar */
        .progress-container {
            position: absolute;
            top: 2.5vh;
            left: 0;
            right: 0;
            display: flex;
            padding: 0 4%;
            gap: 6px;
            z-index: 10;
        }

        .progress-bar {
            height: 4px;
            flex: 1;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #fff;
        }

        /* Header */
        .story-header {
            position: absolute;
            top: 4.5vh;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 10;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            visibility: hidden;
        }

        .meta-info {
            display: flex;
            align-items: center;
            font-size: 2.2vh;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .category { color: #fff; }
        .time-ago { color: var(--text-muted); margin-left: 8px; font-weight: 400; }
        .close-btn { background: none; border: none; color: #fff; font-size: 3.5vh; cursor: pointer; opacity: 0.6; line-height: 1; }

        /* Navigation */
        .nav-zones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
        }
        .zone-left { width: 33%; height: 100%; }
        .zone-right { width: 67%; height: 100%; }

        .slides-container { width: 100%; height: 100%; position: relative; }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        .slide.active { opacity: 1; visibility: visible; }

        /* Bild fix bei 50% */
        .image-container {
            width: 100%;
            height: 50%; 
            position: relative;
            background-color: #000;
        }

        .story-img { width: 100%; height: 100%; object-fit: cover; }

        .image-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 12vh;
            background: linear-gradient(to bottom, transparent, var(--bg-color));
        }

        /* Textbereich */
        .content-container {
            flex: 1;
            padding: 2.5vh 6% 4.5vh 6%; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        .ticker-badge {
            align-self: flex-start;
            font-size: 1.6vh;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--accent-blue);
            margin-bottom: 1.2vh;
        }

        /* Titel: Maximal 5 Zeilen mit festem Line-Height */
        .story-title {
            font-family: Georgia, serif;
            font-size: 4.2vh; 
            line-height: 1.25; 
            font-weight: 700;
            margin-bottom: 1.8vh;
            color: var(--text-color);
            letter-spacing: -0.3px;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Beschreibung: Jetzt ebenfalls auf maximal 5 Zeilen angehoben */
        .story-description {
            font-size: 2.3vh; 
            line-height: 1.45;
            color: var(--text-muted);
            font-weight: 400;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .story-author {
            font-size: 1.8vh;
            color: var(--text-muted);
            margin-top: auto;
            padding-top: 1.5vh;
            opacity: 0.7;
        }
    </style>
</head>
<body>

        <div class="nav-zones">
            <div class="zone-left" id="zoneLeft"></div>
            <div class="zone-right" id="zoneRight"></div>
        </div>

        <div class="slides-container" id="slidesContainer"></div>
