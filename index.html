<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>News Merger</title>
    <style>
        /* Minimalist styling to make source clear */
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .slide { display: none; width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        .slide.active { display: block; }
        .source-badge { color: #1d9bf0; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="slidesArea"></div>

    <script>
        const FEEDS = [
            { url: 'https://www.nzz.ch/recent.rss', name: 'NZZ' },
            { url: 'https://www.economist.com/sections/main/rss.xml', name: 'Economist' }
        ];

        let stories = [];

        async function fetchRSS(feed) {
            try {
                // Using a reliable proxy
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(feed.url)}`);
                const data = await res.json();
                const xml = new DOMParser().parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                
                const parsed = Array.from(items).map(item => ({
                    title: item.querySelector('title')?.textContent,
                    source: feed.name
                }));
                
                console.log(`Successfully loaded ${parsed.length} items from ${feed.name}`);
                return parsed;
            } catch(e) { 
                console.error(`Error loading ${feed.name}:`, e); 
                return []; 
            }
        }

        async function init() {
            const results = await Promise.all(FEEDS.map(fetchRSS));
            
            // COMBINATION LOGIC
            // We take items from both lists and push them into the 'stories' array
            // This loop ensures they are mixed: [NZZ, Econ, NZZ, Econ...]
            for(let i=0; i<Math.max(results[0].length, results[1].length); i++) {
                if(results[0][i]) stories.push(results[0][i]);
                if(results[1][i]) stories.push(results[1][i]);
            }
            
            console.log("Total combined stories:", stories.length);
            console.log("Stories array structure:", stories);

            const area = document.getElementById('slidesArea');
            stories.forEach((s, i) => {
                area.innerHTML += `
                    <div class="slide ${i === 0 ? 'active' : ''}">
                        <div class="source-badge">${s.source}</div>
                        <h1>${s.title}</h1>
                    </div>`;
            });
        }

        init();
    </script>
</body>
</html>
